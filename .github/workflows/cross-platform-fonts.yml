name: Cross-Platform Thesis Build

on:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - "README_EN.md"
      - "docs/**"
      - "contents/excellent-abstract/**"
      - "styles/jouexcellentabstract.sty"
      - "templates/reports/excellent-thesis-abstract.tex"
      - "templates/reports/excellent-thesis-abstract.pdf"
  pull_request:
    paths-ignore:
      - "README.md"
      - "README_EN.md"
      - "docs/**"
      - "contents/excellent-abstract/**"
      - "styles/jouexcellentabstract.sty"
      - "templates/reports/excellent-thesis-abstract.tex"
      - "templates/reports/excellent-thesis-abstract.pdf"
  workflow_dispatch:

concurrency:
  group: thesis-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  thesis-build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: python -m pip install --upgrade pip pillow

      - name: Install Poppler (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y poppler-utils fontconfig

      - name: Install Poppler (macOS)
        if: runner.os == 'macOS'
        run: brew install poppler fontconfig

      - name: Install Poppler (Windows)
        if: runner.os == 'Windows'
        run: choco install poppler -y

      - name: Install TeX Live
        uses: zauguin/install-texlive@v4
        with:
          # Pin the frozen TeX Live repo so fresh CI installs do not break during annual mirror rollover.
          texlive_version: 2025
          repository: https://ftp.math.utah.edu/pub/tex/historic/systems/texlive/2025/tlnet-final
          cache_version: 3
          package_file: .github/texlive.packages

      - name: Download bundled fonts
        run: python scripts/download_fonts.py

      - name: Diagnose font mode
        run: python scripts/check_fonts.py

      - name: Build thesis PDF
        shell: bash
        run: |
          latexmk -xelatex -interaction=nonstopmode -halt-on-error main.tex
          makeindex main.nlo -s nomencl.ist -o main.nls
          latexmk -xelatex -interaction=nonstopmode -halt-on-error main.tex

      - name: Run thesis-focused tests
        run: |
          python tests/test_cross_platform_font_support.py
          python tests/test_thesis_alignment.py
          python tests/test_cover_alignment.py
          python tests/test_academic_features.py

      - name: Upload thesis artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: thesis-${{ matrix.os }}
          path: |
            main.pdf
            docs/assets/thesis-cover-overlay.png
            docs/assets/thesis-cover-overlay-focus.png
            docs/assets/thesis-cover-diff.png
